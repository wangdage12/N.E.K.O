<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>N.E.K.O. Chat</title>

    <!-- VRM 光照默认值：从后端注入，保证在所有 JS 之前同步可用 -->
    <script>window.VRM_DEFAULT_LIGHTING=Object.freeze({{ vrm_defaults | tojson }});</script>
    <!-- 与 index.html 相同的基础 CSS/JS -->
    <script src="/static/i18n-i18next.js?v={{ static_asset_version }}"></script>
    <script src="/static/common_dialogs.js?v={{ static_asset_version }}"></script>
    <link rel="stylesheet" href="/static/css/index.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/css/subtitle.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/css/dark-mode.css?v={{ static_asset_version }}">
    <link rel="stylesheet" href="/static/react/neko-chat/neko-chat-window.css?v={{ static_asset_version }}">
    <script src="/static/theme-manager.js?v={{ static_asset_version }}"></script>
    <link rel="stylesheet" href="/static/libs/APlayer.min.css?v={{ static_asset_version }}">
    <script src="/static/libs/APlayer.min.js?v={{ static_asset_version }}"></script>

    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: transparent !important;
            overflow: hidden;
        }
        /* Electron 独立窗口模式：React Chat 覆盖全窗口 */
        #react-chat-window-overlay {
            position: fixed; inset: 0;
            display: block !important;
            background: transparent !important;
        }
        #react-chat-window-backdrop { display: none !important; }
        #react-chat-window-shell:not(.is-minimized):not(.is-collapsing):not(.is-expanding) {
            position: fixed !important;
            inset: 40px 25px 25px 20px !important;
            width: auto !important; height: auto !important;
            max-width: none !important; max-height: none !important;
            transform: none !important;
            border-radius: 22px !important;
            background: transparent !important;
            /* 液态边缘反光 — 顶部最亮，左次之，模拟顶光 */
            border-top: 2px solid rgba(255, 255, 255, 0.7) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.35) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06) !important;
            /* 外阴影 + 内高光带 */
            box-shadow:
                0 4px 16px rgba(12, 20, 34, 0.18),
                0 1px 4px rgba(12, 20, 34, 0.1),
                inset 0 2px 4px rgba(255, 255, 255, 0.5),
                inset 0 -1px 2px rgba(255, 255, 255, 0.08) !important;
        }
        /* 顶栏：降低透明度 + 减小高度（原 min-height:54px + padding:10px 14px 8px） */
        .window-topbar {
            background: rgba(255, 255, 255, 0.35) !important;
            min-height: 45px !important;
            height: 45px !important;
            padding: 0 12px !important;
            box-sizing: border-box !important;
        }
        .window-topbar-actions,
        .window-topbar-actions > * {
            display: flex !important;
            align-items: center !important;
        }
        /* 右上角四个按钮居中对齐 topbar（原 top:10px 基于 54px 高度，现适配 45px） */
        #react-chat-window-header-actions {
            top: 5px !important;
        }
        #reactChatWindowCloseButton {
            position: relative !important;
            top: -2px !important;
        }
        body.yui-guide-chat-buttons-disabled #react-chat-window-shell button,
        body.yui-guide-chat-buttons-disabled #toggle-chat-btn {
            pointer-events: none !important;
        }
        body.yui-guide-chat-buttons-disabled #react-chat-window-shell .composer-panel,
        body.yui-guide-chat-buttons-disabled #react-chat-window-shell .composer-input-shell,
        body.yui-guide-chat-buttons-disabled #react-chat-window-shell .composer-input,
        body.yui-guide-chat-buttons-disabled #text-input-area,
        body.yui-guide-chat-buttons-disabled #textInputBox,
        body.yui-guide-chat-buttons-disabled #neko-resize-handle,
        body.yui-guide-chat-buttons-disabled #react-chat-window-shell .react-chat-resize-edge {
            pointer-events: none !important;
        }
        body.yui-guide-chat-buttons-disabled #react-chat-window-shell .composer-input,
        body.yui-guide-chat-buttons-disabled #textInputBox,
        body.yui-guide-chat-buttons-disabled #toggle-chat-btn {
            caret-color: transparent !important;
            user-select: none !important;
        }
        @keyframes yui-guide-chat-window-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.014); }
        }
        @keyframes yui-guide-chat-input-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }
        @keyframes yui-guide-chat-spotlight-sweep {
            0%,
            62% {
                opacity: 0;
                transform: translateX(0) skewX(-12deg);
            }
            78% {
                opacity: 0.42;
            }
            100% {
                opacity: 0;
                transform: translateX(420%) skewX(-12deg);
            }
        }
        #yui-guide-chat-spotlight {
            position: fixed;
            left: 0;
            top: 0;
            width: 0;
            height: 0;
            border-radius: 18px;
            pointer-events: none;
            z-index: 100055;
            opacity: 0;
            overflow: visible;
            isolation: isolate;
            transform-origin: center center;
            transition: opacity 140ms ease;
        }
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-chrome,
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-ear-left,
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-ear-right,
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-paw {
            position: absolute;
            pointer-events: none;
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
        }
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-chrome {
            inset: 3px;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(84, 133, 255, 0.09), rgba(89, 211, 255, 0.03));
            box-shadow:
                0 0 0 1px rgba(214, 243, 255, 0.72),
                0 0 18px rgba(104, 194, 255, 0.56),
                0 0 34px rgba(87, 136, 255, 0.26),
                inset 0 0 16px rgba(131, 214, 255, 0.16);
        }
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-chrome::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 2px;
            border-radius: inherit;
            --yui-guide-chat-spotlight-corner-size: min(34%, 138px);
            --yui-guide-chat-spotlight-border-gap: min(68%, 144px);
            background:
                linear-gradient(rgba(39, 89, 228, 0.98), rgba(39, 89, 228, 0.98)) top center / calc(100% - var(--yui-guide-chat-spotlight-border-gap)) 2px no-repeat,
                linear-gradient(rgba(39, 89, 228, 0.98), rgba(39, 89, 228, 0.98)) bottom center / calc(100% - var(--yui-guide-chat-spotlight-border-gap)) 2px no-repeat,
                linear-gradient(90deg, rgba(39, 89, 228, 0.98), rgba(39, 89, 228, 0.98)) left center / 2px calc(100% - var(--yui-guide-chat-spotlight-border-gap)) no-repeat,
                linear-gradient(90deg, rgba(39, 89, 228, 0.98), rgba(39, 89, 228, 0.98)) right center / 2px calc(100% - var(--yui-guide-chat-spotlight-border-gap)) no-repeat,
                radial-gradient(circle at top left,
                    rgba(235, 249, 255, 0.98) 0,
                    rgba(186, 231, 255, 0.98) 13%,
                    rgba(76, 137, 255, 0.95) 52%,
                    rgba(39, 89, 228, 0.98) 96%,
                    transparent 100%
                ) top left / var(--yui-guide-chat-spotlight-corner-size) var(--yui-guide-chat-spotlight-corner-size) no-repeat,
                radial-gradient(circle at top right,
                    rgba(235, 249, 255, 0.98) 0,
                    rgba(186, 231, 255, 0.98) 13%,
                    rgba(76, 137, 255, 0.95) 52%,
                    rgba(39, 89, 228, 0.98) 96%,
                    transparent 100%
                ) top right / var(--yui-guide-chat-spotlight-corner-size) var(--yui-guide-chat-spotlight-corner-size) no-repeat,
                radial-gradient(circle at bottom right,
                    rgba(235, 249, 255, 0.98) 0,
                    rgba(186, 231, 255, 0.98) 13%,
                    rgba(76, 137, 255, 0.95) 52%,
                    rgba(39, 89, 228, 0.98) 96%,
                    transparent 100%
                ) bottom right / var(--yui-guide-chat-spotlight-corner-size) var(--yui-guide-chat-spotlight-corner-size) no-repeat,
                radial-gradient(circle at bottom left,
                    rgba(235, 249, 255, 0.98) 0,
                    rgba(186, 231, 255, 0.98) 13%,
                    rgba(76, 137, 255, 0.95) 52%,
                    rgba(39, 89, 228, 0.98) 96%,
                    transparent 100%
                ) bottom left / var(--yui-guide-chat-spotlight-corner-size) var(--yui-guide-chat-spotlight-corner-size) no-repeat;
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            mask-composite: exclude;
        }
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-sweep {
            position: absolute;
            inset: 8px;
            border-radius: inherit;
            overflow: hidden;
            pointer-events: none;
            z-index: 4;
        }
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-sweep::before {
            content: '';
            position: absolute;
            top: -22%;
            bottom: -22%;
            left: -48%;
            width: 34%;
            background:
                linear-gradient(108deg, transparent 0 10%, rgba(255, 255, 255, 0.58) 45%, rgba(125, 225, 255, 0.26) 58%, transparent 100%);
            filter: blur(0.2px);
            opacity: 0;
            pointer-events: none;
            transform: translateX(0) skewX(-12deg);
            animation: yui-guide-chat-spotlight-sweep 2.4s ease-in-out infinite;
        }
        #yui-guide-chat-spotlight.is-visible {
            opacity: 1;
        }
        #yui-guide-chat-spotlight.is-window {
            animation: yui-guide-chat-window-pulse 1.5s ease-in-out infinite;
        }
        #yui-guide-chat-spotlight.is-input {
            animation: yui-guide-chat-input-pulse 1.5s ease-in-out infinite;
        }
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-ear-left {
            top: -29px;
            left: 2px;
            width: 94.5px;
            height: 40.5px;
            background-image: url('/static/assets/tutorial/highlight/left-cat-ear.png?v={{ static_asset_version }}');
        }
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-ear-right {
            top: -30px;
            right: 2px;
            width: 94.5px;
            height: 40.5px;
            background-image: url('/static/assets/tutorial/highlight/right-cat-ear.png?v={{ static_asset_version }}');
        }
        #yui-guide-chat-spotlight .yui-guide-chat-spotlight-paw {
            right: -18px;
            bottom: -11px;
            width: 51px;
            height: 51px;
            background-image: url('/static/assets/tutorial/highlight/cat-paw.png?v={{ static_asset_version }}');
            filter: drop-shadow(0 0 8px rgba(119, 211, 255, 0.58));
        }
        #yui-guide-chat-spotlight.is-window .yui-guide-chat-spotlight-chrome {
            box-shadow:
                0 0 0 1px rgba(214, 243, 255, 0.72),
                0 0 22px rgba(104, 194, 255, 0.62),
                0 0 42px rgba(87, 136, 255, 0.3),
                inset 0 0 18px rgba(131, 214, 255, 0.18);
        }
        #yui-guide-chat-spotlight.is-input .yui-guide-chat-spotlight-chrome {
            box-shadow:
                0 0 0 1px rgba(214, 243, 255, 0.72),
                0 0 16px rgba(104, 194, 255, 0.52),
                0 0 28px rgba(87, 136, 255, 0.22),
                inset 0 0 12px rgba(131, 214, 255, 0.14);
        }
        /* Chat 字体优化（覆盖 6 语：中简/繁/英/日/韩/俄） */
        #react-chat-window-root {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter',
                         'Noto Sans', 'PingFang SC', 'Microsoft YaHei',
                         'Hiragino Sans', 'Malgun Gothic', sans-serif !important;
            font-weight: 400 !important;
        }
        [data-theme="dark"] .window-topbar {
            background: rgba(50, 50, 72, 0.35) !important;
        }
        /* 四边透明度渐变带：窄边（~10px），让边缘内容淡出露出高光 */
        #react-chat-window-root {
            -webkit-mask-image:
                linear-gradient(to bottom, rgba(0,0,0,0.3) 0px, black 10px, black calc(100% - 10px), rgba(0,0,0,0.6) 100%),
                linear-gradient(to right, rgba(0,0,0,0.4) 0px, black 8px, black calc(100% - 8px), rgba(0,0,0,0.4) 100%) !important;
            -webkit-mask-composite: source-in !important;
        }
        @keyframes liquidFlow {
            0%    { background-position:   0%   0%,  80%  10%,  40%  30%,  90%  50%,  20%  70%,  60%  85%,  95%  90%; }
            12%   { background-position:  50%  15%,  20%  60%,  80%  10%,  40%  80%,  70%   5%,  10%  50%,  55%  35%; }
            25%   { background-position:  90%  55%,  50%  90%,  15%  65%,  75%  20%,  45%  85%,  85%  15%,  20%  70%; }
            38%   { background-position:  30%  85%,  85%  30%,  60%  95%,  10%  45%,  90%  40%,  40%  70%,  70%  10%; }
            50%   { background-position:  70%  40%,  10%  75%,  95%  20%,  55%  90%,  15%  30%,  75%  55%,  35%  80%; }
            63%   { background-position:  15%  70%,  65%  15%,  30%  50%,  85%  65%,  55%  95%,  25%  25%,  80%  50%; }
            75%   { background-position:  80%  25%,  35%  85%,  70%  40%,  20%  10%,  85%  60%,  50%  90%,  10%  30%; }
            88%   { background-position:  45%  90%,  90%  45%,  10%  75%,  60%  35%,  30%  50%,  80%  10%,  50%  65%; }
            100%  { background-position:   0%   0%,  80%  10%,  40%  30%,  90%  50%,  20%  70%,  60%  85%,  95%  90%; }
        }
        /* 对角光带扫过 */
        @keyframes lightSweep {
            0%   { background-position: -150% -150%; }
            100% { background-position: 250% 250%; }
        }
        /* 静态边缘高光层 — 在内容之下 */
        #react-chat-window-shell:not(.is-minimized)::before {
            content: '' !important;
            position: absolute !important;
            inset: 0 !important;
            border-radius: 22px !important;
            pointer-events: none !important;
            z-index: 0 !important;
            /* 边缘高光 */
            box-shadow:
                inset 0 2px 6px rgba(255, 255, 255, 0.5),
                inset 0 -1px 3px rgba(255, 255, 255, 0.1),
                inset 2px 0 4px rgba(255, 255, 255, 0.15),
                inset -2px 0 4px rgba(255, 255, 255, 0.08) !important;
            /* 顶部弧形高光（静态） */
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.25) 0%,
                rgba(255, 255, 255, 0.08) 8%,
                transparent 20%,
                transparent 85%,
                rgba(255, 255, 255, 0.04) 100%
            ) !important;
        }
        /* 流动光斑层 — 三色径向渐变缓慢漂移，模拟玻璃折射
           用 background-image 而非 background 简写，避免 !important 锁死 background-position */
        #react-chat-window-shell:not(.is-minimized)::after {
            content: '' !important;
            position: absolute !important;
            inset: 0 !important;
            border-radius: 22px !important;
            pointer-events: none !important;
            z-index: 10 !important;
            background-image:
                radial-gradient(circle at 15% 10%, rgba(100,180,255,0.14) 0%, transparent 22%),
                radial-gradient(circle at 75% 15%, rgba(180,140,255,0.11) 0%, transparent 20%),
                radial-gradient(circle at 40% 35%, rgba(220,140,240,0.12) 0%, transparent 18%),
                radial-gradient(circle at 85% 50%, rgba(120,200,255,0.13) 0%, transparent 20%),
                radial-gradient(circle at 25% 65%, rgba(200,160,255,0.10) 0%, transparent 19%),
                radial-gradient(circle at 60% 80%, rgba(100,190,255,0.12) 0%, transparent 21%),
                radial-gradient(circle at 90% 85%, rgba(240,150,200,0.10) 0%, transparent 17%) !important;
            background-size: 200% 200%, 200% 200%, 200% 200%, 200% 200%, 200% 200%, 200% 200%, 200% 200% !important;
            background-repeat: no-repeat !important;
            animation: liquidFlow 20s ease-in-out infinite !important;
        }
        /* 折叠/展开动画期间：允许 JS 控制 position/size/transform */
        #react-chat-window-shell.is-collapsing,
        #react-chat-window-shell.is-expanding {
            inset: auto !important;
            max-width: none !important; max-height: none !important;
            border-radius: 22px !important;
        }
        /* 最小化态 */
        #react-chat-window-shell.is-minimized {
            inset: auto !important;
            max-width: none !important; max-height: none !important;
        }
        /* 输入区提到光晕层之上，保持原始不透明度 */
        .composer-panel {
            position: relative !important;
            z-index: 15 !important;
        }
        /* 输入框描边加粗 */
        .composer-input-shell {
            border: 1.5px solid rgba(127, 144, 170, 0.25) !important;
        }
        /* placeholder 样式：淡色小字 */
        .composer-input::placeholder {
            color: rgba(102, 117, 141, 0.5) !important;
            font-size: 0.85em !important;
        }
        /* 消息气泡进场动效 —— 由 neko-chat-window.css 统一定义，此处不重复声明。
           旧版在此处用 !important 重复声明 @keyframes + animation 规则，会导致浏览器
           对同名 @keyframes 做二次解析，且 !important 阻止 prefers-reduced-motion
           等未来覆盖，已移除。 */

        /* GalGame 模式：撑高窗口和外壳，预留 A/B/C 一来就有位置，避免
           jump-resize；输入壳本身不再硬撑 min-height，由 .composer-galgame-slot
           的 max-height 过渡驱动自然长高，参见 react-neko-chat styles.css。 */
        body.galgame-mode-enabled #react-chat-window-shell {
            min-height: 320px !important;
        }
        body.galgame-mode-enabled {
            min-height: 385px !important;
        }

        /* Electron 独立窗口始终显示全部工具按钮（覆盖 index.css 768px 媒体查询隐藏） */
        #react-chat-window-shell .composer-bottom-tools > .composer-tool-btn:last-child {
            display: inline-flex !important;
        }
        #react-chat-window-shell .composer-bottom-tools > .composer-tool-divider:nth-last-child(2) {
            display: inline !important;
        }
        /* 隐藏旧版 chat */
        #chat-container { display: none !important; }
        /* 旧版 chat 样式保留但不激活（app-*.js 的 getElementById 依赖 DOM 存在）*/
        /*chat-container 填满窗口（窗口大小由 JS 控制）*/
        .legacy-chat-style #chat-container {
            position: fixed !important;
            left: 0 !important; top: 0 !important;
            width: 100% !important; height: 100% !important;
            max-height: 100% !important;
            border: none !important; margin: 0 !important;
            bottom: auto !important; right: auto !important;
            /* 独立窗口容器始终 100%，禁用 index.css 的 width/height 过渡
               —— 否则 setBounds 缩窗时容器会动画延迟跟随，导致跳变 */
            transition: box-shadow 0.2s ease, transform 0.32s ease !important;
        }
        #chat-container::before { border-radius: 8px !important; }
        #chat-header { cursor: grab; user-select: none; }

        /* 折叠态呼吸球 */
        @keyframes breathingGlow {
            0%, 100% { box-shadow: 0 0 8px rgba(68, 183, 254, 0.6); }
            50% { box-shadow: 0 0 16px rgba(68, 183, 254, 1); }
        }
        #chat-container.minimized {
            width: 50px !important; height: 50px !important;
            max-height: 50px !important; min-width: 0 !important; min-height: 0 !important;
            border-radius: 50% !important;
            background: rgba(68, 183, 254, 0.15) !important;
            animation: breathingGlow 2s ease-in-out infinite !important;
            cursor: pointer !important;
            left: 50% !important; top: 50% !important;
            transform: translate(-50%, -50%) !important;
            overflow: visible !important;
        }
        /* 折叠态禁用原生拖拽，改用 JS 手动拖拽 + 点击展开 */
        #chat-container.minimized,
        #chat-container.minimized * {
            -webkit-app-region: no-drag !important;
        }
        /* 折叠球拖拽中：禁用呼吸动画和 box-shadow，减少透明窗口 setBounds 重绘开销 */
        #chat-container.minimized.dragging {
            animation: none !important;
            box-shadow: 0 0 8px rgba(68, 183, 254, 0.6) !important;
            transition: none !important;
        }
        #chat-container.minimized::before {
            border-radius: 50% !important;
            background: rgba(68, 183, 254, 0.15) !important;
        }

        /* resize 手柄 */
        #neko-resize-handle {
            position: absolute; right: 2px; bottom: 2px;
            width: 16px; height: 16px; z-index: 100;
            cursor: nwse-resize; opacity: 0.7; pointer-events: auto;
            background-image: linear-gradient(135deg,
                transparent 0 35%, rgba(68,183,254,.42) 35% 43%,
                transparent 43% 52%, rgba(68,183,254,.58) 52% 60%,
                transparent 60% 70%, rgba(68,183,254,.78) 70% 78%,
                transparent 78% 100%);
        }
        #neko-resize-handle:hover { opacity: 1; }

        /* 暗色模式透明背景覆盖 —— dark-mode.css 的 max-width:768px 媒体查询
           会将 html/body 背景设为 #000，但 chat 窗口宽度 400px 始终命中该查询，
           导致透明窗口背景变黑，在圆角外围显示黑色矩形 */
        html[data-theme="dark"],
        html[data-theme="dark"] body {
            background: transparent !important;
        }

        /* resize 期间：CSS 变量即时跟随鼠标，min() 确保不超过 viewport 防止裁切
           —— 缩小时 CSS 变量 < viewport → 即时生效；放大时 CSS 变量 > viewport → 钳位到 100vw/vh，等 setBounds 追上 */
        html.neko-resizing #chat-container {
            width: min(var(--neko-resize-w, 100%), 100vw) !important;
            height: min(var(--neko-resize-h, 100%), 100vh) !important;
            max-height: min(var(--neko-resize-h, 100%), 100vh) !important;
            transition: none !important;
        }
        html.neko-resizing #chat-container::before {
            /* 禁用 backdrop-filter 大幅减少 resize 期间 GPU 重绘压力 */
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            transition: none !important;
        }
        html.neko-resizing #chat-content-wrapper {
            scroll-behavior: auto !important;
        }

        /* 折叠动画：缩小 + 淡出 */
        #chat-container.neko-collapsing {
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.28s ease !important;
            transform-origin: left bottom !important;
            transform: scale(0.12) !important;
            opacity: 0 !important;
            pointer-events: none !important;
            overflow: hidden !important;
        }
        /* 展开动画起始态 */
        #chat-container.neko-expand-start {
            transform: scale(0.12) !important;
            opacity: 0 !important;
            transition: none !important;
            pointer-events: none !important;
        }
        /* 展开动画目标态 */
        #chat-container.neko-expanding {
            transform: scale(1) !important;
            opacity: 1 !important;
            transition: transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        opacity 0.28s ease !important;
            transform-origin: left bottom !important;
            pointer-events: none !important;
        }

        /* 独立窗口始终使用桌面样式，屏蔽 index.css / dark-mode.css 768px 移动端媒体查询
           —— 300px 缓冲扩展策略会使 viewport 跨越 768px 断点，导致布局跳变 */
        #chat-header {
            height: 48px !important;
            font-size: inherit !important;
        }
        #chat-content-wrapper {
            padding: 16px !important;
            padding-top: 48px !important;
            background: rgba(249, 249, 249, 0.7) !important;
        }
        #text-input-area {
            padding: 12px !important;
            background: rgba(255, 255, 255, 0.5) !important;
            /* 禁用 index.css 的 transition: all 0.3s，避免 resize 时布局动画 */
            transition: none !important;
        }
        #textInputBox {
            height: 102px !important;
        }
        #button-group {
            gap: 6px !important;
        }
        #textSendButton,
        #screenshotButton {
            padding: 8px 16px !important;
            font-size: inherit !important;
            min-width: auto !important;
        }
        /* 暗色模式同理（桌面默认值：dark-mode.css line 146, 172）*/
        [data-theme="dark"] #chat-content-wrapper {
            background: rgba(25, 25, 25, 0.8) !important;
        }
        [data-theme="dark"] #text-input-area {
            background: rgba(40, 40, 40, 0.65) !important;
        }
    </style>
</head>

    <script src="/static/app-chat-adapter.js?v={{ static_asset_version }}"></script>

    <script>
    // =====================================================================
    // 独立窗口：窗口级 resize / 折叠（拖拽由 -webkit-app-region: drag 原生处理）
    // =====================================================================
    (function() {
        'use strict';
        var W = window.nekoChatWindow;
        if (!W) return;

        var box = document.getElementById('chat-container');
        var hdr = document.getElementById('chat-header');
        var btn = document.getElementById('toggle-chat-btn');
        var wrap = document.getElementById('chat-content-wrapper');
        var tia = document.getElementById('text-input-area');
        var rh  = document.getElementById('neko-resize-handle');
        if (!box) return;

        // BALL: 折叠态呼吸球的窗口总尺寸（CSS .minimized 50px 内容 + 32px Electron 窗口边框/阴影余量）
        var BALL = 82;
        var MIN_W = 300;
        var MIN_H_BASE = 200;
        // GalGame 模式开启时输入框需要额外 ~110px 容纳 A/B/C 选项 + 间距，
        // 否则用户首次进入会看到选项被裁切到 send 按钮下方。
        // GAL 模式的 320px 是内容壳最低高度；独立窗口还有 top/bottom inset，
        // 需要把外层窗口最小高度抬高，否则压扁后输入区底部会被窗口裁掉。
        var MIN_H_GALGAME = 385;
        function isGalgameModeOn() {
            return !!(document.body && document.body.classList.contains('galgame-mode-enabled'));
        }
        function currentMinH() {
            return isGalgameModeOn() ? MIN_H_GALGAME : MIN_H_BASE;
        }
        Object.defineProperty(window, '__nekoChatMinH', {
            get: currentMinH,
            configurable: true
        });

        // GalGame 模式开/关时，如果当前窗口高度小于新最小值，主动 setBounds 撑高，
        // 否则用户切到 ON 后会看到选项被裁切到 send 按钮下方。
        function syncWindowToGalgameMin() {
            if (collapsed || resizing || animating) return;
            var minH = currentMinH();
            try {
                W.getBounds().then(function(b) {
                    if (!b) return;
                    if (b.height >= minH) return;
                    W.setBounds(b.x, b.y, b.width, minH);
                });
            } catch (_) {}
        }
        // body class 由 app-react-chat-window.js 在 toggle 时刷新；这里订阅
        // 主动同步事件，避免轮询 / MutationObserver 的重绘开销。
        window.addEventListener('react-chat-window:galgame-mode-change', syncWindowToGalgameMin);
        // 启动时不再主动撑高：app-react-chat-window 在 storage barrier 之后
        // 调 setGalgameModeEnabled(readPref) 把 false→true 翻转一次，change 事件
        // 兜底；ON 持久化时这条路径必走、OFF 持久化时不会触发不必要的扩大。

        var collapsed = false;
        var animating = false;
        var savedWH = null;
        var resizing = false;

        // ---- 滚动辅助 ----
        // 在 scroll 事件中持续跟踪是否处于底部附近，
        // MutationObserver / resize 回调使用缓存值而非重新计算，
        // 避免 DOM 变更后 scrollHeight 已增大导致 isNearBottom() 误判。
        var wasNearBottom = true;
        function isNearBottom() {
            if (!wrap) return true;
            return wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 60;
        }
        function scrollToBottom(instant) {
            if (!wrap || !wasNearBottom) return;
            wrap.scrollTo({ top: wrap.scrollHeight, behavior: instant ? 'instant' : 'smooth' });
            wasNearBottom = true;
        }
        if (wrap) {
            wrap.addEventListener('scroll', function() {
                wasNearBottom = isNearBottom();
            });
            new MutationObserver(function() { scrollToBottom(resizing); })
                .observe(wrap, { childList: true, subtree: true });
        }
        // resize 期间也跟随滚动
        window.addEventListener('resize', function() {
            if (collapsed) return;
            scrollToBottom(resizing);
        });

        // tooltip 自动消失
        var tooltip = document.getElementById('chat-tooltip');
        if (tooltip) setTimeout(function(){ tooltip.classList.add('hidden'); }, 5000);

        // ===================== resize handle（右下角拖拽调整大小）=====================
        // 预缓冲策略：mousedown 时将窗口扩展到工作区最大可用空间，
        // 拖拽期间仅更新 CSS 变量（零 IPC），mouseup 时一次 setBounds 裁剪至最终尺寸。
        var _pendingBounds = null;
        var _expandMax = null;
        var _cleanupTimer = 0;
        var _cleanupListener = null;
        var anchorSX = 0, anchorSY = 0;
        var snapBounds = null;

        if (rh) rh.addEventListener('mousedown', function(e) {
            if (collapsed || animating) return;
            e.preventDefault();
            e.stopPropagation();

            resizing = true;
            anchorSX = e.screenX;
            anchorSY = e.screenY;

            // 同步快照窗口位置/尺寸
            snapBounds = {
                x: window.screenX,
                y: window.screenY,
                w: window.outerWidth,
                h: window.outerHeight
            };

            var root = document.documentElement;
            // 初始 CSS 变量 = 当前尺寸，防止容器暂时撑满缓冲区
            root.style.setProperty('--neko-resize-w', snapBounds.w + 'px');
            root.style.setProperty('--neko-resize-h', snapBounds.h + 'px');
            root.classList.add('neko-resizing');

        })();

        console.log('[Chat Standalone] ready');

        // ===== 截图结果监听（多窗口模式下 Pet 窗口代为全屏截图裁剪后回传）=====
        window.addEventListener('neko:screenshot-result', function(e) {
            var result = e.detail;
            if (result && result.dataUrl) {
                // 优先写入旧版 pending list DOM，再由 syncPendingComposerAttachments
                // 自动同步到 React Chat，确保 legacy sendTextPayloadInternal 和 React 都读到同一套数据。
                if (typeof window.addScreenshotToList === 'function') {
                    window.addScreenshotToList(result.dataUrl);
                } else if (window.reactChatWindowHost) {
                    var state = window.reactChatWindowHost.getState();
                    var attachments = (state && state.composerAttachments) ? state.composerAttachments.slice() : [];
                    attachments.push({
                        id: 'screenshot-' + Date.now(),
                        url: result.dataUrl,
                        alt: (typeof window.t === 'function' ? window.t('chat.pendingImageAlt', { index: attachments.length + 1 }) : '') || ('图片 ' + (attachments.length + 1))
                    });
                    window.reactChatWindowHost.setComposerAttachments(attachments);
                }
                if (typeof window.showStatusToast === 'function') {
                    window.showStatusToast(
                        typeof window.t === 'function' ? window.t('app.screenshotAdded') : '\u622A\u56FE\u5DF2\u6DFB\u52A0\uFF0C\u70B9\u51FB\u53D1\u9001\u4E00\u8D77\u53D1\u9001',
                        3000
                    );
                }
            } else if (result && result.error) {
                if (typeof window.showStatusToast === 'function') {
                    window.showStatusToast(
                        (typeof window.t === 'function' ? window.t('app.screenshotFailed') : '\u622A\u56FE\u5931\u8D25') + (result.error ? ': ' + result.error : ''),
                        5000
                    );
                }
            }
        });
    })();
    </script>
</body>
</html>
